    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .active {
        background-color: green !important;
        color: white !important;
        }

        .dark {
        background-color: black;
        color: white;
        }

        .dark .card {
        background-color: #111;
        color: white;
        border: 1px solid #aaa;
        }

        .light {
        background-color: #ffffff;
        color: black;
        }

        .light .card {
        background-color: white;
        color: black;
        border: 1px solid black;
        }
    </style>
    </head>

    <body>
    <div class="container-fluid">
        <h1 class="text-center">Mahsulotlar</h1>

        <!-- Theme -->
        <div class="my-3">
            <button id="themeBtn" class="btn btn-dark" onclick="toggleTheme()">
                Dark
            </button>
        </div>

        <div class="my-3">
            <a href="cart.html" class="btn btn-success"> Cart</a>
        </div>

        <!-- Search -->
        <div>
        <input type="text" id="input" class="form-control" placeholder="Mahsulotni kiriting...">
        </div>

        <!-- Category -->
        <div class="my-3 category">
        <button class="btn btn-outline-primary active" onclick="setCategory('all')">All</button>
        <button class="btn btn-outline-primary" onclick="setCategory('laptop')">Laptop</button>
        <button class="btn btn-outline-primary" onclick="setCategory('phone')">Phone</button>
        <button class="btn btn-outline-primary" onclick="setCategory('accessory')">Accessory</button>
        </div>

        <!-- Products -->
        <div class="row" id="products"></div>
    </div>

    <script src="/DOM/script.js"></script>
    </body>
    </html>
