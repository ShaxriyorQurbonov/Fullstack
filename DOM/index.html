<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
    <h1 class="text-center my-3">Mahsulotlar</h1>

    <div class="mb-3">
        <input type="text" id="search" class="form-control" placeholder="Mahsulotni kiriting...">
    </div>

    <div class="mb-3">
        <button class="btn btn-primary filter" data-category="all">All</button>
        <button class="btn btn-primary filter" data-category="laptop">Laptop</button>
        <button class="btn btn-primary filter" data-category="phone">Phone</button>
        <button class="btn btn-primary filter" data-category="accessory">Accessory</button>
    </div>

    <div class="row" id="products"></div>
</div>

<script src="/DOM/script.js"></script>
</body>
</html>
